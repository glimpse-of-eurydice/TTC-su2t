<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Tibetan-to-Mandarin speech-to-unit translation pipeline</title>
  <desc id="desc">A visual pipeline showing Tibetan source speech features, Mandarin target speech construction, HuBERT acoustic units, Transformer S2UT training, language-model guided decoding, Unit-BLEU evaluation, and retrieval diagnostics.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#384454"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#253040" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg { fill: #f7f4ef; }
      .title { font: 700 30px Arial, Helvetica, sans-serif; fill: #1f2933; }
      .subtitle { font: 400 15px Arial, Helvetica, sans-serif; fill: #5b6673; }
      .stage-label { font: 700 14px Arial, Helvetica, sans-serif; letter-spacing: 1px; fill: #49525f; }
      .box { stroke-width: 1.4; rx: 16; filter: url(#shadow); }
      .source { fill: #e9f3f0; stroke: #58a28f; }
      .target { fill: #fff0df; stroke: #dd9a4b; }
      .model { fill: #edf0ff; stroke: #6f7fd0; }
      .eval { fill: #f3ecf9; stroke: #a678bd; }
      .warn { fill: #fff7d9; stroke: #d3a72e; }
      .box-title { font: 700 17px Arial, Helvetica, sans-serif; fill: #202a35; }
      .box-text { font: 400 13px Arial, Helvetica, sans-serif; fill: #465260; }
      .small { font: 400 12px Arial, Helvetica, sans-serif; fill: #5d6875; }
      .arrow { fill: none; stroke: #384454; stroke-width: 2.4; marker-end: url(#arrow); }
      .arrow-soft { fill: none; stroke: #768292; stroke-width: 2; stroke-dasharray: 6 6; marker-end: url(#arrow); }
      .divider { stroke: #d3d7dc; stroke-width: 1.2; stroke-dasharray: 4 7; }
      .unit { fill: #ffffff; stroke: #6f7fd0; stroke-width: 1; rx: 5; }
      .unit-text { font: 700 12px Arial, Helvetica, sans-serif; fill: #5966b3; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="720"/>

  <text class="title" x="60" y="58">Tibetan Speech to Mandarin Acoustic Units</text>
  <text class="subtitle" x="60" y="84">The prototype avoids generating Tibetan text and learns to predict Mandarin-side discrete speech units.</text>

  <line class="divider" x1="300" y1="120" x2="300" y2="650"/>
  <line class="divider" x1="590" y1="120" x2="590" y2="650"/>
  <line class="divider" x1="880" y1="120" x2="880" y2="650"/>

  <text class="stage-label" x="82" y="126">SOURCE SPEECH</text>
  <text class="stage-label" x="362" y="126">TARGET UNIT BUILDING</text>
  <text class="stage-label" x="658" y="126">S2UT MODEL</text>
  <text class="stage-label" x="947" y="126">EVALUATION</text>

  <rect class="box source" x="54" y="154" width="214" height="86"/>
  <text class="box-title" x="78" y="185">TCST Tibetan audio</text>
  <text class="box-text" x="78" y="209">Amdo, Kham, U-Tsang</text>
  <text class="box-text" x="78" y="228">source utterances</text>

  <rect class="box source" x="54" y="300" width="214" height="86"/>
  <text class="box-title" x="78" y="331">Log-Mel features</text>
  <text class="box-text" x="78" y="355">80-dimensional speech</text>
  <text class="box-text" x="78" y="374">features for the encoder</text>

  <rect class="box target" x="338" y="154" width="214" height="86"/>
  <text class="box-title" x="362" y="185">Mandarin metadata</text>
  <text class="box-text" x="362" y="209">TCST Chinese text</text>
  <text class="box-text" x="362" y="228">used as target meaning</text>

  <rect class="box target" x="338" y="276" width="214" height="86"/>
  <text class="box-title" x="362" y="307">Edge-TTS speech</text>
  <text class="box-text" x="362" y="331">synthetic Mandarin target</text>
  <text class="box-text" x="362" y="350">audio for unit extraction</text>

  <rect class="box target" x="338" y="398" width="214" height="86"/>
  <text class="box-title" x="362" y="429">HuBERT layer 6</text>
  <text class="box-text" x="362" y="453">self-supervised acoustic</text>
  <text class="box-text" x="362" y="472">representations</text>

  <rect class="box target" x="338" y="520" width="214" height="92"/>
  <text class="box-title" x="362" y="551">K-means units</text>
  <text class="box-text" x="362" y="575">K = 100 final setting</text>
  <text class="box-text" x="362" y="594">deduplicated unit sequence</text>

  <rect class="unit" x="374" y="623" width="34" height="24"/>
  <rect class="unit" x="414" y="623" width="34" height="24"/>
  <rect class="unit" x="454" y="623" width="34" height="24"/>
  <rect class="unit" x="494" y="623" width="34" height="24"/>
  <text class="unit-text" x="385" y="640">17</text>
  <text class="unit-text" x="425" y="640">42</text>
  <text class="unit-text" x="465" y="640">08</text>
  <text class="unit-text" x="505" y="640">73</text>

  <rect class="box model" x="632" y="226" width="212" height="112"/>
  <text class="box-title" x="656" y="257">Transformer S2UT</text>
  <text class="box-text" x="656" y="281">encoder reads Tibetan</text>
  <text class="box-text" x="656" y="300">speech features</text>
  <text class="box-text" x="656" y="319">decoder predicts Mandarin units</text>

  <rect class="box model" x="632" y="408" width="212" height="86"/>
  <text class="box-title" x="656" y="439">3-gram unit LM</text>
  <text class="box-text" x="656" y="463">shallow fusion at decode</text>
  <text class="box-text" x="656" y="482">best weight: 0.6</text>

  <rect class="box model" x="632" y="554" width="212" height="86"/>
  <text class="box-title" x="656" y="585">Predicted units</text>
  <text class="box-text" x="656" y="609">Mandarin-side acoustic</text>
  <text class="box-text" x="656" y="628">unit sequence</text>

  <rect class="box eval" x="922" y="174" width="222" height="90"/>
  <text class="box-title" x="946" y="205">Unit-BLEU</text>
  <text class="box-text" x="946" y="229">sequence-overlap metric</text>
  <text class="box-text" x="946" y="248">best: 19.50 at K=100</text>

  <rect class="box eval" x="922" y="330" width="222" height="96"/>
  <text class="box-title" x="946" y="361">KNN retrieval</text>
  <text class="box-text" x="946" y="385">nearest target units</text>
  <text class="box-text" x="946" y="404">rendered as Mandarin text</text>

  <rect class="box warn" x="922" y="500" width="222" height="110"/>
  <text class="box-title" x="946" y="531">Safety check</text>
  <text class="box-text" x="946" y="555">fluent retrieved Mandarin</text>
  <text class="box-text" x="946" y="574">can still be wrong</text>
  <text class="small" x="946" y="598">Metric score is not enough</text>

  <path class="arrow" d="M161 240 L161 300"/>
  <path class="arrow" d="M268 343 C390 343 500 284 632 282"/>
  <path class="arrow" d="M445 240 L445 276"/>
  <path class="arrow" d="M445 362 L445 398"/>
  <path class="arrow" d="M445 484 L445 520"/>
  <path class="arrow" d="M552 566 C596 566 606 606 632 606"/>
  <path class="arrow" d="M552 566 C604 566 598 284 632 282"/>
  <path class="arrow-soft" d="M552 566 C610 566 608 452 632 452"/>
  <path class="arrow" d="M738 338 L738 408"/>
  <path class="arrow" d="M738 494 L738 554"/>
  <path class="arrow" d="M844 596 C892 596 892 220 922 220"/>
  <path class="arrow" d="M844 596 C890 596 892 379 922 379"/>
  <path class="arrow" d="M1033 426 L1033 500"/>

  <text class="small" x="62" y="672">Training signal: Tibetan speech features paired with Mandarin discrete target units.</text>
  <text class="small" x="730" y="672">Diagnostic signal: retrieval examples reveal failures hidden by aggregate Unit-BLEU.</text>
</svg>
